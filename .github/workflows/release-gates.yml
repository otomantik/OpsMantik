name: Release Gates

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: release-gates-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run safe PR release gates
        if: ${{ github.event_name == 'pull_request' }}
        run: npm run release:evidence:pr

      - name: Assert production release gate secrets
        if: ${{ github.event_name != 'pull_request' }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          test -n "$NEXT_PUBLIC_SUPABASE_URL" || (echo "NEXT_PUBLIC_SUPABASE_URL is required" && exit 1)
          test -n "$SUPABASE_SERVICE_ROLE_KEY" || (echo "SUPABASE_SERVICE_ROLE_KEY is required" && exit 1)

      - name: Run live release proof and collect evidence
        if: ${{ github.event_name != 'pull_request' }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SYNC_API_URL: ${{ secrets.SYNC_API_URL || 'https://console.opsmantik.com/api/sync' }}
          P0_SITES: ${{ secrets.P0_SITES || 'yapiozmendanismanlik.com,sosreklam.com' }}
          OCI_EXPORT_RUN_INTEGRITY_STRICT: ${{ vars.OCI_EXPORT_RUN_INTEGRITY_STRICT || '0' }}
          OCI_EXPORT_RUN_WAIVER_OWNER: ${{ vars.OCI_EXPORT_RUN_WAIVER_OWNER || '' }}
          OCI_EXPORT_RUN_WAIVER_REASON: ${{ vars.OCI_EXPORT_RUN_WAIVER_REASON || '' }}
          OCI_EXPORT_RUN_WAIVER_EXPIRY: ${{ vars.OCI_EXPORT_RUN_WAIVER_EXPIRY || '' }}
          OCI_EXPORT_RUN_WAIVER_BLAST_RADIUS: ${{ vars.OCI_EXPORT_RUN_WAIVER_BLAST_RADIUS || '' }}
          OCI_RECOVERY_INTEGRITY_STRICT: ${{ vars.OCI_RECOVERY_INTEGRITY_STRICT || '0' }}
          OCI_PROCESSING_RECOVERY_CLASSIFIER_MODE: ${{ vars.OCI_PROCESSING_RECOVERY_CLASSIFIER_MODE || 'off' }}
          OCI_ROW_SCOPED_RECOVERY_RPC_PRESENT: ${{ vars.OCI_ROW_SCOPED_RECOVERY_RPC_PRESENT || '0' }}
          OCI_PROCESSING_CLASSIFIER_ENFORCEMENT_SUPPORTED: ${{ vars.OCI_PROCESSING_CLASSIFIER_ENFORCEMENT_SUPPORTED || '0' }}
          OCI_PROCESSING_RECOVERY_WAIVER_OWNER: ${{ vars.OCI_PROCESSING_RECOVERY_WAIVER_OWNER || '' }}
          OCI_PROCESSING_RECOVERY_WAIVER_REASON: ${{ vars.OCI_PROCESSING_RECOVERY_WAIVER_REASON || '' }}
          OCI_PROCESSING_RECOVERY_WAIVER_EXPIRY: ${{ vars.OCI_PROCESSING_RECOVERY_WAIVER_EXPIRY || '' }}
          OCI_PROCESSING_RECOVERY_WAIVER_BLAST_RADIUS: ${{ vars.OCI_PROCESSING_RECOVERY_WAIVER_BLAST_RADIUS || '' }}
          TARGET_DB_EVIDENCE_STRICT: ${{ vars.TARGET_DB_EVIDENCE_STRICT || '1' }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL || '' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL || '' }}
        run: npm run release:evidence:production

      - name: Upload PR release gate evidence
        if: ${{ always() && hashFiles('tmp/release-gates-pr.md') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-evidence-pr
          path: tmp/release-gates-pr.md
          retention-days: 14

      - name: Upload live release gate evidence
        if: ${{ always() && hashFiles('tmp/release-gates-latest.md') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-evidence
          path: tmp/release-gates-latest.md
          retention-days: 14

      - name: Upload target DB evidence artifacts
        if: ${{ always() && hashFiles('tmp/db-evidence-latest.json') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: target-db-evidence
          path: |
            tmp/db-evidence-latest.json
            tmp/db-evidence-latest.md
            tmp/db-evidence-normalized.json
            tmp/release-gates-latest.json
            tmp/release-gates-normalized.json
          retention-days: 14
